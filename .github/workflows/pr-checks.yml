name: PR Checks

on:
  pull_request:
    branches: [master]

permissions:
  pull-requests: write

jobs:
  checks:
    name: Quality
    runs-on: ubuntu-latest

    env:
      BUILD_TIME_LIMIT_S: 120
      CHUNK_SIZE_LIMIT_KB: 600

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install

      # ── Quality ────────────────────────────────────────────────────────────
      - name: Format check (oxfmt — TS/JS/JSON)
        id: fmt_oxfmt
        run: pnpm lint:fmt
        continue-on-error: true

      - name: Format check (Prettier — Svelte/MD)
        id: fmt_prettier
        run: pnpm lint:fmt:svelte
        continue-on-error: true

      - name: Oxlint
        id: oxlint
        run: pnpm lint:code
        continue-on-error: true

      # ── Build (needed for content-collection types + metrics) ───────────────
      - name: Build + measure time
        id: timing
        run: |
          START=$(date +%s)
          pnpm build
          ELAPSED=$(( $(date +%s) - START ))
          echo "build_seconds=$ELAPSED" >> "$GITHUB_OUTPUT"
          if [ "$ELAPSED" -le "$BUILD_TIME_LIMIT_S" ]; then
            echo "time_ok=true"  >> "$GITHUB_OUTPUT"
          else
            echo "time_ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Measure largest shared chunk
        id: sizes
        run: |
          CHUNK_DIR=".svelte-kit/cloudflare/app/immutable/chunks"
          LARGEST=$(ls -S "$CHUNK_DIR"/*.js 2>/dev/null | head -1)
          SIZE_KB=$(( $(wc -c < "$LARGEST") / 1024 ))
          echo "chunk_kb=$SIZE_KB"                   >> "$GITHUB_OUTPUT"
          echo "chunk_name=$(basename "$LARGEST")"   >> "$GITHUB_OUTPUT"
          if [ "$SIZE_KB" -le "$CHUNK_SIZE_LIMIT_KB" ]; then
            echo "size_ok=true"  >> "$GITHUB_OUTPUT"
          else
            echo "size_ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Svelte type-check
        id: svelte_check
        run: pnpm check
        continue-on-error: true

      # ── Post PR comment ────────────────────────────────────────────────────
      - name: Post results comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const icon = s => s === 'success' ? '✅' : s === 'failure' ? '❌' : '⏭️';

            const fmtOxfmt    = '${{ steps.fmt_oxfmt.outcome }}';
            const fmtPrettier = '${{ steps.fmt_prettier.outcome }}';
            const oxlint      = '${{ steps.oxlint.outcome }}';
            const svelteCheck = '${{ steps.svelte_check.outcome }}';
            const buildSecs   = '${{ steps.timing.outputs.build_seconds }}';
            const chunkKb     = '${{ steps.sizes.outputs.chunk_kb }}';
            const chunkName   = '${{ steps.sizes.outputs.chunk_name }}';
            const timeOk      = '${{ steps.timing.outputs.time_ok }}' === 'true';
            const sizeOk      = '${{ steps.sizes.outputs.size_ok }}'  === 'true';

            const allOk =
              fmtOxfmt === 'success' && fmtPrettier === 'success' &&
              oxlint === 'success' && svelteCheck === 'success' && timeOk && sizeOk;

            const header = allOk
              ? '### ✅ CI Checks passed'
              : '### ❌ CI Checks failed';

            const body = [
              header,
              '',
              '| | Check | Result |',
              '|:---:|---|---|',
              `| ${icon(fmtOxfmt)}      | oxfmt (TS/JS/JSON)  | ${fmtOxfmt === 'success' ? 'passed' : fmtOxfmt} |`,
              `| ${icon(fmtPrettier)}   | Prettier (Svelte/MD)| ${fmtPrettier === 'success' ? 'passed' : fmtPrettier} |`,
              `| ${icon(oxlint)}        | Oxlint              | ${oxlint === 'success' ? 'passed' : oxlint} |`,
              `| ${icon(svelteCheck)}   | Svelte type-check | ${svelteCheck === 'success' ? 'passed' : svelteCheck} |`,
              `| ${timeOk ? '✅' : '❌'} | Build time        | ${buildSecs}s (limit 120s) |`,
              `| ${sizeOk ? '✅' : '❌'} | Shared bundle     | ${chunkKb} KB (limit 600 KB) — \`${chunkName}\` |`,
              '',
              `<sub>Updated ${new Date().toUTCString()}</sub>`,
              '<!-- vizchitra-pr-checks -->'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const existing = comments.find(c =>
              c.body.includes('<!-- vizchitra-pr-checks -->')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

      # ── Fail the job if any check failed ───────────────────────────────────
      - name: Assert all passed
        if: >
          steps.fmt_oxfmt.outcome    != 'success' ||
          steps.fmt_prettier.outcome != 'success' ||
          steps.oxlint.outcome       != 'success' ||
          steps.svelte_check.outcome != 'success' ||
          steps.timing.outputs.time_ok == 'false' ||
          steps.sizes.outputs.size_ok  == 'false'
        run: exit 1
